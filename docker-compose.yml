services:
  db:
    image: postgres:15
    container_name: rotafive_db
    restart: always
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: rotafive
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:alpine
    container_name: rotafive_cache
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
